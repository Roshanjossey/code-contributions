<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rajnandani-80 | Open Source Journey</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
    }

    .card {
      width: 350px;
      background: #fff;
      border-radius: 16px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    h1 {
      font-size: 24px;
      color: #2a5298;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 16px;
      color: #555;
      margin-bottom: 15px;
      font-weight: normal;
    }

    p {
      font-size: 14px;
      color: #777;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #333;
    }

    .badge {
      display: inline-block;
      background: #3874a4;
      color: white;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      margin-top: 5px;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Rajnandani-80</h1>
    <h2>I am starting my journey in open source 🚀</h2>
    <p>Excited to contribute and learn from the global developer community.</p>

    <div class="section-title">Programming Languages</div>
    <div class="badge">C++</div>

    <div class="footer">
      Keep learning • Keep building • Keep contributing
    </div>
  </div>

</body>
</html>
