<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>woesel-dev</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f5f5f3;
      display: flex;
      justify-content: center;
      padding: 3rem 1rem;
      min-height: 100vh;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid #e4e2d9;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
      height: fit-content;
    }

    /* Header */
    .header { display: flex; align-items: center; gap: 14px; }
    .avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: #E6F1FB; border: 1px solid #B5D4F4;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 500; color: #0C447C;
      flex-shrink: 0;
    }
    .name { font-size: 18px; font-weight: 500; color: #1a1a18; }
    .handle { font-size: 13px; color: #888780; margin-top: 2px; }
    .bio { font-size: 14px; color: #5f5e5a; margin-top: 5px; }

    /* Divider */
    .divider { border: none; border-top: 1px solid #e4e2d9; margin: 1.5rem 0; }

    /* Section labels */
    .section-label {
      font-size: 11px; font-weight: 500; color: #b4b2a9;
      text-transform: uppercase; letter-spacing: 0.07em;
      margin-bottom: 0.6rem;
    }

    /* Social buttons */
    .social-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
    .social-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 6px 14px; border-radius: 999px;
      border: 1px solid #e4e2d9; background: #ffffff;
      font-size: 13px; font-weight: 500; color: #1a1a18;
      text-decoration: none; cursor: pointer;
      transition: background 0.15s;
    }
    .social-btn:hover { background: #f5f5f3; }

    /* Language chips */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 999px;
      border: 1px solid #e4e2d9; background: #f5f5f3;
      font-size: 13px; font-weight: 500; color: #1a1a18;
    }
    .chip img { width: 15px; height: 15px; }
    .chip-py  { background: #E8F0FB; border-color: #B5D4F4; color: #0C447C; }
    .chip-cpp { background: #EEF5E5; border-color: #C0DD97; color: #27500A; }
    .chip-java { background: #FAEEDA; border-color: #FAC775; color: #633806; }
    .chip-js  { background: #FFFAE6; border-color: #EFD88A; color: #854F0B; }
    .chip-c   { background: #F1EFE8; border-color: #D3D1C7; color: #444441; }

    /* Tool cards */
    .tool-grid { display: flex; flex-wrap: wrap; gap: 10px; }
    .tool-card {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 12px 16px; border-radius: 8px;
      border: 1px solid #e4e2d9; background: #ffffff;
      min-width: 72px;
    }
    .tool-card img { width: 28px; height: 28px; }
    .tool-name { font-size: 11px; color: #888780; }
  </style>
</head>
<body>
  <article class="card">

    <!-- Header -->
    <div class="header">
      <div class="avatar">W</div>
      <div>
        <p class="name">Tenzin Woesel Kunsang Lama</p>

        <p class="bio">To become a goated Tibetan programmer</p>

    <hr class="divider">

    </div>

    <!-- Languages -->
    <p class="section-label">Languages</p>
    <div class="chips">
      <span class="chip chip-py">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/python/python-original.svg" alt="Python">
        Python
      </span>
      <span class="chip chip-cpp">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/cplusplus/cplusplus-original.svg" alt="C++">

      <span class="chip chip-java">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/java/java-original.svg" alt="Java">
        Java

      <span class="chip chip-js">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/javascript/javascript-original.svg" alt="JavaScript">
        JavaScript
      </span>
      <span class="chip chip-c">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/c/c-original.svg" alt="C">
        C
      </span>
    </div>

    <!-- Tools -->
    <p class="section-label">Tools</p>
    <div class="tool-grid">
      <div class="tool-card">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/bash/bash-original.svg" alt="Bash">
        <span class="tool-name">Bash</span>
      </div>
      <div class="tool-card">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/linux/linux-original.svg" alt="Linux">
        <span class="tool-name">Linux</span>
      </div>
    </div>

  </article>
</body>
</html>
