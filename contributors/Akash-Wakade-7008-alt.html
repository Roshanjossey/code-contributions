<!DOCTYPE html>
<html>
<head>
  <title>Akash Wakade</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      font-family: "Segoe UI", sans-serif;
      color: #fff;
    }

    .card {
      width: 380px;
      background: #111827;
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      margin: auto;
      margin-bottom: 1rem;
    }

    h2 {
      margin: 0.5rem 0;
      font-size: 1.5rem;
    }

    p {
      font-size: 0.9rem;
      color: #9ca3af;
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-size: 0.85rem;
      text-align: left;
      margin-bottom: 0.5rem;
      color: #9ca3af;
    }

    .badges {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .badge {
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
      background: #1f2937;
      border: 1px solid #374151;
      transition: all 0.2s ease;
    }

    .badge:hover {
      transform: scale(1.05);
    }

    /* Slight color hint per language */
    .python { border-color: #3776ab; }
    .js { border-color: #f7df1e; }
    .cpp { border-color: #00599c; }
    .java { border-color: #f89820; }
    .html { border-color: #e34c26; }
    .css { border-color: #264de4; }

    .tools {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .tool {
      background: #1f2937;
      padding: 10px;
      border-radius: 10px;
      transition: all 0.2s ease;
    }

    .tool:hover {
      transform: translateY(-4px);
      background: #2563eb;
    }

    .tool img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #6b7280;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="avatar">A</div>

  <h2>Akash Wakade</h2>
  <p>First Year Student • Web Developer</p>

  <!-- Languages -->
  <div class="section-title">Languages</div>
  <div class="badges">
    <div class="badge python">Python</div>
    <div class="badge js">JavaScript</div>
    <div class="badge cpp">C++</div>
    <div class="badge java">Java</div>
    <div class="badge html">HTML</div>
    <div class="badge css">CSS</div>
  </div>

  <!-- Tools -->
  <div class="section-title">Tools & Technologies</div>

  <div class="tools">
    <!-- Row 1 -->
    <div class="tool"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/react/react-original.svg"></div>
    <div class="tool"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/nodejs/nodejs-original.svg"></div>
    <div class="tool"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/mongodb/mongodb-original.svg"></div>
    <div class="tool"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/mysql/mysql-original.svg"></div>
    <div class="tool"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/linux/linux-original.svg"></div>

    <!-- Row 2 (UPDATED icons for better visibility) -->
    <div class="tool"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/git/git-original.svg"></div>

    <!-- FIXED: GitHub (use light version for dark bg) -->
    <div class="tool"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/github/github-original-wordmark.svg"></div>

    <div class="tool"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/vscode/vscode-original.svg"></div>
    <div class="tool"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/postman/postman-original.svg"></div>

    <!-- FIXED: Bash → better visible version -->
    <div class="tool"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/bash/bash-original.svg"></div>
  </div>

  <div class="footer">
    Building projects • Learning everyday 🚀
  </div>

</div>

</body>
</html>
